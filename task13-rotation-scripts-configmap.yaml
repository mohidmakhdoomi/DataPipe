apiVersion: v1
kind: ConfigMap
metadata:
  name: credential-rotation-scripts
  namespace: data-ingestion
data:
  rotation-functions.sh: |
    #!/bin/bash
    # Credential rotation functions
    
    set -euo pipefail
    
    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color
    
    # Configuration
    ROTATION_SCHEDULE_DAYS=${ROTATION_SCHEDULE_DAYS:-90}
    NAMESPACE=${NAMESPACE:-data-ingestion}
    
    # Function to check if secret needs rotation
    needs_rotation() {
        local secret_name=$1
        local max_age_days=$2
        
        if ! kubectl get secret "$secret_name" -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Secret $secret_name not found"
            return 1
        fi
        
        local creation_time=$(kubectl get secret "$secret_name" -n "$NAMESPACE" -o jsonpath='{.metadata.creationTimestamp}')
        local creation_epoch=$(date -d "$creation_time" +%s)
        local current_epoch=$(date +%s)
        local age_days=$(( (current_epoch - creation_epoch) / 86400 ))
        
        echo "Secret $secret_name age: $age_days days (max: $max_age_days days)"
        
        if [ $age_days -ge $max_age_days ]; then
            return 0  # Needs rotation
        else
            return 1  # Does not need rotation
        fi
    }
    
    # Function to rotate PostgreSQL credentials
    rotate_postgresql_credentials() {
        echo -e "${YELLOW}Rotating PostgreSQL credentials...${NC}"
        
        # Generate new password
        local new_password=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-25)
        
        # Update PostgreSQL user password
        kubectl exec -n "$NAMESPACE" postgresql-0 -- psql -U postgres -d ecommerce -c \
          "ALTER USER debezium PASSWORD '$new_password';" || {
          echo -e "${RED}Failed to update PostgreSQL password${NC}"
          return 1
        }
        
        # Test new password
        kubectl exec -n "$NAMESPACE" postgresql-0 -- psql -U debezium -d ecommerce -c \
          "SELECT current_user;" >/dev/null || {
          echo -e "${RED}New password verification failed${NC}"
          return 1
        }
        
        # Create new secret
        kubectl create secret generic postgresql-credentials-new \
          --namespace="$NAMESPACE" \
          --from-literal=username=debezium \
          --from-literal=password="$new_password" \
          --dry-run=client -o yaml | kubectl apply -f - || {
          echo -e "${RED}Failed to create new PostgreSQL secret${NC}"
          return 1
        }
        
        echo -e "${GREEN}✓ PostgreSQL credentials rotated successfully${NC}"
        return 0
    }
    
    # Function to rotate S3 credentials
    rotate_s3_credentials() {
        echo -e "${YELLOW}Rotating S3 credentials...${NC}"
        
        # Get current IAM user
        local iam_user=$(aws sts get-caller-identity --query 'Arn' --output text | cut -d'/' -f2 2>/dev/null || echo "")
        
        if [ -z "$iam_user" ]; then
            echo -e "${RED}Failed to get IAM user${NC}"
            return 1
        fi
        
        # Create new access key
        local new_key_output=$(aws iam create-access-key --user-name "$iam_user" 2>/dev/null || echo "")
        
        if [ -z "$new_key_output" ]; then
            echo -e "${RED}Failed to create new access key${NC}"
            return 1
        fi
        
        local new_access_key=$(echo "$new_key_output" | jq -r '.AccessKey.AccessKeyId')
        local new_secret_key=$(echo "$new_key_output" | jq -r '.AccessKey.SecretAccessKey')
        
        # Test new credentials
        export AWS_ACCESS_KEY_ID="$new_access_key"
        export AWS_SECRET_ACCESS_KEY="$new_secret_key"
        
        aws s3 ls "s3://$S3_BUCKET_NAME/" >/dev/null 2>&1 || {
          echo -e "${RED}New S3 credentials verification failed${NC}"
          unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
          return 1
        }
        
        unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY
        
        # Create new secret
        kubectl create secret generic aws-credentials-new \
          --namespace="$NAMESPACE" \
          --from-literal=aws_access_key_id="$new_access_key" \
          --from-literal=aws_secret_access_key="$new_secret_key" \
          --dry-run=client -o yaml | kubectl apply -f - || {
          echo -e "${RED}Failed to create new S3 secret${NC}"
          return 1
        }
        
        echo -e "${GREEN}✓ S3 credentials rotated successfully${NC}"
        return 0
    }
    
    # Function to send notification
    send_notification() {
        local subject=$1
        local message=$2
        local severity=${3:-INFO}
        
        echo "NOTIFICATION [$severity]: $subject"
        echo "$message"
        
        # In a real environment, you would send notifications via:
        # - Slack webhook
        # - Email
        # - PagerDuty
        # - Teams webhook
        # etc.
    }
    
    # Main function to check and rotate credentials
    check_and_rotate_credentials() {
        local rotation_needed=false
        local rotation_results=()
        
        echo "Checking credential rotation requirements..."
        echo "Rotation schedule: $ROTATION_SCHEDULE_DAYS days"
        echo
        
        # Check PostgreSQL credentials
        if needs_rotation "postgresql-credentials" "$ROTATION_SCHEDULE_DAYS"; then
            echo -e "${YELLOW}PostgreSQL credentials need rotation${NC}"
            rotation_needed=true
            
            if rotate_postgresql_credentials; then
                rotation_results+=("PostgreSQL: SUCCESS")
                send_notification "PostgreSQL Credentials Rotated" "PostgreSQL CDC user credentials have been successfully rotated." "INFO"
            else
                rotation_results+=("PostgreSQL: FAILED")
                send_notification "PostgreSQL Credential Rotation Failed" "Failed to rotate PostgreSQL CDC user credentials. Manual intervention required." "ERROR"
            fi
        else
            echo -e "${GREEN}PostgreSQL credentials are current${NC}"
            rotation_results+=("PostgreSQL: CURRENT")
        fi
        
        echo
        
        # Check S3 credentials
        if needs_rotation "aws-credentials" "$ROTATION_SCHEDULE_DAYS"; then
            echo -e "${YELLOW}S3 credentials need rotation${NC}"
            rotation_needed=true
            
            if rotate_s3_credentials; then
                rotation_results+=("S3: SUCCESS")
                send_notification "S3 Credentials Rotated" "S3 access credentials have been successfully rotated." "INFO"
            else
                rotation_results+=("S3: FAILED")
                send_notification "S3 Credential Rotation Failed" "Failed to rotate S3 access credentials. Manual intervention required." "ERROR"
            fi
        else
            echo -e "${GREEN}S3 credentials are current${NC}"
            rotation_results+=("S3: CURRENT")
        fi
        
        echo
        echo "=== Rotation Summary ==="
        for result in "${rotation_results[@]}"; do
            echo "  $result"
        done
        
        if [ "$rotation_needed" = false ]; then
            echo -e "${GREEN}No credential rotation required at this time${NC}"
        else
            echo -e "${YELLOW}Credential rotation cycle completed${NC}"
        fi
        
        # Generate rotation report
        local timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        local report_file="/tmp/credential-rotation-report-$timestamp.json"
        
        cat > "$report_file" << EOF
{
  "rotation_check": {
    "timestamp": "$timestamp",
    "namespace": "$NAMESPACE",
    "rotation_schedule_days": $ROTATION_SCHEDULE_DAYS,
    "rotation_needed": $rotation_needed,
    "results": [
$(IFS=$'\n'; echo "${rotation_results[*]}" | sed 's/^/      "/' | sed 's/$/"/' | sed '$!s/$/,/')
    ]
  }
}
EOF
        
        echo "Rotation report saved to: $report_file"
    }