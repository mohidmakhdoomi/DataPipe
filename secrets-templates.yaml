# Data Ingestion Pipeline - Secrets Templates
# Based on multi-model consensus analysis (Gemini 2.5 Pro, Opus 4, Grok 4, O3)
# Task 3: File-based secrets mounting (requirement 7.1 - K8s Secrets)
# NOTE: These are templates - actual secrets will be populated in later tasks

---
# PostgreSQL database credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: data-ingestion
  labels:
    app.kubernetes.io/name: data-ingestion-pipeline
    app.kubernetes.io/component: postgresql
    secret-type: database-credentials
  annotations:
    description: "PostgreSQL connection credentials for CDC replication"
    mount-path: "/etc/secrets/postgres"
type: Opaque
data:
  # Base64 encoded values - populate in Task 4
  username: ""  # debezium user with replication permissions
  password: ""  # secure password for debezium user
  database: ""  # ecommerce database name
  hostname: ""  # postgresql service name
  port: ""      # 5432

---
# Kafka cluster credentials and configuration
apiVersion: v1
kind: Secret
metadata:
  name: kafka-credentials
  namespace: data-ingestion
  labels:
    app.kubernetes.io/name: data-ingestion-pipeline
    app.kubernetes.io/component: kafka
    secret-type: cluster-credentials
  annotations:
    description: "Kafka inter-broker authentication and client credentials"
    mount-path: "/etc/secrets/kafka"
type: Opaque
data:
  # Base64 encoded values - populate in Task 5
  bootstrap-servers: ""     # kafka-0:9092,kafka-1:9092,kafka-2:9092
  client-id: ""            # debezium-connector
  security-protocol: ""     # PLAINTEXT for development, SASL_SSL for production
  sasl-mechanism: ""       # PLAIN
  sasl-username: ""        # kafka client username
  sasl-password: ""        # kafka client password

---
# AWS S3 credentials for data archival
apiVersion: v1
kind: Secret
metadata:
  name: aws-s3-credentials
  namespace: data-ingestion
  labels:
    app.kubernetes.io/name: data-ingestion-pipeline
    app.kubernetes.io/component: s3-sink
    secret-type: cloud-credentials
  annotations:
    description: "AWS S3 credentials for Kafka Connect S3 Sink connector"
    mount-path: "/etc/secrets/s3"
    requirement: "7.2-encrypted-s3-connections"
type: Opaque
data:
  # Base64 encoded values - populate in Task 10
  access-key-id: ""        # AWS access key for S3 bucket access
  secret-access-key: ""    # AWS secret key for S3 bucket access
  region: ""               # us-west-2 (from design document)
  bucket-name: ""          # data-lake-ingestion (from design document)
  encryption: ""           # SSE-S3 (server-side encryption)

---
# TLS certificates for secure communication (future use)
apiVersion: v1
kind: Secret
metadata:
  name: kafka-tls-certs
  namespace: data-ingestion
  labels:
    app.kubernetes.io/name: data-ingestion-pipeline
    app.kubernetes.io/component: kafka
    secret-type: tls-certificates
  annotations:
    description: "TLS certificates for Kafka broker encryption (production use)"
    mount-path: "/etc/secrets/tls"
type: kubernetes.io/tls
data:
  # Base64 encoded values - populate when implementing TLS
  tls.crt: ""              # TLS certificate
  tls.key: ""              # TLS private key
  ca.crt: ""               # Certificate Authority certificate

---
# Secret mounting configuration examples for deployments
# This ConfigMap provides examples of how to mount secrets in pod specs
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-mounting-examples
  namespace: data-ingestion
  labels:
    app.kubernetes.io/name: data-ingestion-pipeline
    config-type: deployment-examples
  annotations:
    description: "Examples of how to mount secrets in pod specifications"
data:
  postgresql-example.yaml: |
    # Example PostgreSQL pod spec with secret mounting
    apiVersion: v1
    kind: Pod
    spec:
      serviceAccountName: postgresql-sa
      containers:
      - name: postgresql
        image: postgres:15
        volumeMounts:
        - name: postgres-credentials
          mountPath: "/etc/secrets/postgres"
          readOnly: true
        env:
        - name: POSTGRES_PASSWORD_FILE
          value: "/etc/secrets/postgres/password"
        - name: POSTGRES_USER_FILE
          value: "/etc/secrets/postgres/username"
      volumes:
      - name: postgres-credentials
        secret:
          secretName: postgresql-credentials
          
  debezium-example.yaml: |
    # Example Debezium/Kafka Connect pod spec with multiple secret mounts
    apiVersion: v1
    kind: Pod
    spec:
      serviceAccountName: debezium-sa
      containers:
      - name: kafka-connect
        image: debezium/connect:2.4
        volumeMounts:
        - name: postgres-credentials
          mountPath: "/etc/secrets/postgres"
          readOnly: true
        - name: kafka-credentials
          mountPath: "/etc/secrets/kafka"  
          readOnly: true
        - name: s3-credentials
          mountPath: "/etc/secrets/s3"
          readOnly: true
        env:
        - name: BOOTSTRAP_SERVERS_FILE
          value: "/etc/secrets/kafka/bootstrap-servers"
        - name: AWS_ACCESS_KEY_ID_FILE
          value: "/etc/secrets/s3/access-key-id"
        - name: AWS_SECRET_ACCESS_KEY_FILE
          value: "/etc/secrets/s3/secret-access-key"
      volumes:
      - name: postgres-credentials
        secret:
          secretName: postgresql-credentials
      - name: kafka-credentials
        secret:
          secretName: kafka-credentials
      - name: s3-credentials
        secret:
          secretName: aws-s3-credentials