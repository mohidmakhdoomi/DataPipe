apiVersion: batch/v1
kind: CronJob
metadata:
  name: credential-rotation
  namespace: data-ingestion
  labels:
    app: credential-rotation
    task: task13
spec:
  # Run every Sunday at 2 AM UTC
  schedule: "0 2 * * 0"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: credential-rotation
            task: task13
        spec:
          serviceAccountName: credential-rotation-sa
          restartPolicy: OnFailure
          containers:
          - name: credential-rotation
            image: alpine:3.18
            command: ["/bin/bash"]
            args:
              - -c
              - |
                set -euo pipefail
                
                # Install required tools
                apk add --no-cache \
                  bash \
                  curl \
                  jq \
                  postgresql-client \
                  openssl \
                  aws-cli
                
                # Install kubectl
                curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl
                mv kubectl /usr/local/bin/
                
                echo "=== Credential Rotation Check ==="
                echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                echo "Namespace: data-ingestion"
                echo
                
                # Source rotation functions
                source /scripts/rotation-functions.sh
                
                # Check if rotation is needed and perform if required
                check_and_rotate_credentials
                
                echo "=== Credential Rotation Check Complete ==="
            env:
            - name: NAMESPACE
              value: "data-ingestion"
            - name: POSTGRES_HOST
              value: "postgresql.data-ingestion.svc.cluster.local"
            - name: S3_BUCKET_NAME
              value: "datapipe-ingestion-dev"
            - name: AWS_REGION
              value: "us-east-1"
            - name: ROTATION_SCHEDULE_DAYS
              value: "90"  # Rotate every 90 days in development
            volumeMounts:
            - name: rotation-scripts
              mountPath: /scripts
              readOnly: true
            - name: aws-credentials
              mountPath: /root/.aws
              readOnly: true
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: rotation-scripts
            configMap:
              name: credential-rotation-scripts
              defaultMode: 0755
          - name: aws-credentials
            secret:
              secretName: aws-credentials
              optional: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: credential-rotation-sa
  namespace: data-ingestion
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: data-ingestion
  name: credential-rotation-role
rules:
# Permissions needed for credential rotation
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  verbs: ["get"]
# Permissions for monitoring rollouts
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: credential-rotation-binding
  namespace: data-ingestion
subjects:
- kind: ServiceAccount
  name: credential-rotation-sa
  namespace: data-ingestion
roleRef:
  kind: Role
  name: credential-rotation-role
  apiGroup: rbac.authorization.k8s.io